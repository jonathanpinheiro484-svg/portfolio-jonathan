<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senac</title>
</head>

<body>

    <h1>Cadastro de aluno</h1>

    <!-- 
    A tag table cria uma tabela.
    boorder="1" cria uma borda simples.
    cellpadding="8" cria espaço interno dentro das célualas.
    cellspacing="0" remove o espaço entre as células.
    -->

    <table border="1" cellpadding="8" cellspacing="0">
        <!-- tr: linhas na tabelas -->
        <tr>
            <!-- th cria uma coluna de cabeçalho -->
            <th>Nome</th>
            <th>E-mail</th>
            <th>Telefone</th>
            <th>Idade</th>
        </tr>

        <!-- td celula de tabela comum -->
        <tr>
            <td>Cristiano</td>
            <td>cristiano@email.com</td>
            <td>11 94949-5151</td>
            <td>48</td>
        </tr>

        <tr>
            <td>Jonathan</td>
            <td>jonathan@email.com</td>
            <td>11 96948-5251</td>
            <td>18</td>
        </tr>

        <tr>
            <td>Danilo</td>
            <td>Danilo@email.com</td>
            <td>11 97919-5957</td>
            <td>22</td>
        </tr>


    </table>

</body>

</html>
